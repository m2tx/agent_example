<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222538;
      --border: #2e3148;
      --accent: #7c6af7;
      --accent-hover: #6a58e8;
      --text: #e8e9f0;
      --text-muted: #7a7f9a;
      --user-bg: #2a2060;
      --user-border: #4a38c0;
      --fn-bg: #0d2030;
      --fn-border: #1a4060;
      --fn-text: #5bb8f5;
      --radius: 12px;
    }

    body.light {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface2: #eef0f6;
      --border: #d0d3e0;
      --accent: #7c6af7;
      --accent-hover: #6a58e8;
      --text: #1a1d27;
      --text-muted: #6b7080;
      --user-bg: #ede8ff;
      --user-border: #c4b5f7;
      --fn-bg: #e8f4ff;
      --fn-border: #b0d4f0;
      --fn-text: #2a6090;
    }

    body.light .bubble.model code { color: #6a3a9a; }
    body.light .bubble.model pre code { color: #1a4070; }
    body.light .bubble.model strong { color: #4a3a9a; }
    body.light .bubble.model em { color: #3a5070; }
    body.light .btn-danger:hover { background: #ffe0e6; border-color: #c04060; color: #901030; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.3px;
      flex: 1;
    }

    .session-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .session-controls label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #session {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      width: 200px;
      outline: none;
      transition: border-color 0.15s;
    }

    #session:focus { border-color: var(--accent); }

    .btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--border); border-color: var(--accent); }

    .btn-danger:hover { background: #3a1020; border-color: #c04060; color: #f08090; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg-row {
      display: flex;
      animation: fade-in 0.2s ease-out;
    }

    .msg-row.user { justify-content: flex-end; }
    .msg-row.model { justify-content: flex-start; }
    .msg-row.function { justify-content: flex-start; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      max-width: min(680px, 85%);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 3px;
      color: var(--text);
      white-space: pre-wrap;
    }

    .bubble.model {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .bubble.function {
      background: var(--fn-bg);
      border: 1px solid var(--fn-border);
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      color: var(--fn-text);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fn-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    /* ── Markdown styles (inside .bubble.model) ── */
    .bubble.model p { margin: 0 0 10px; }
    .bubble.model p:last-child { margin-bottom: 0; }
    .bubble.model h1, .bubble.model h2, .bubble.model h3, .bubble.model h4 {
      margin: 14px 0 6px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }
    .bubble.model h1 { font-size: 1.25em; }
    .bubble.model h2 { font-size: 1.1em; }
    .bubble.model h3, .bubble.model h4 { font-size: 1em; }
    .bubble.model ul, .bubble.model ol { margin: 4px 0 10px 20px; }
    .bubble.model li { margin-bottom: 3px; }
    .bubble.model code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12.5px;
      color: #c9a7f5;
    }
    .bubble.model pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble.model pre code {
      background: none;
      border: none;
      padding: 0;
      color: #b0d8ff;
      font-size: 13px;
    }
    .bubble.model blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 6px 0;
      color: var(--text-muted);
    }
    .bubble.model a { color: var(--accent); text-decoration: underline; }
    .bubble.model table { border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%; }
    .bubble.model th, .bubble.model td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .bubble.model th { background: var(--surface2); font-weight: 600; }
    .bubble.model hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .bubble.model strong { font-weight: 700; color: #d0c8ff; }
    .bubble.model em { font-style: italic; color: #c8d8f0; }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .empty-icon { font-size: 48px; opacity: 0.3; }
    .empty p { font-size: 14px; }

    /* ── Input area ── */
    #input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    #prompt {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 180px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #prompt:focus { border-color: var(--accent); }
    #prompt::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      flex-shrink: 0;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-icon { font-size: 16px; line-height: 1; }
  </style>
</head>
<body>

  <header>
    <h1>⚡ AI Agent</h1>
    <div class="session-controls">
      <label for="session">Sessão:</label>
      <input type="text" id="session" placeholder="ID da sessão">
      <button class="btn" onclick="loadSession()">Carregar</button>
      <button class="btn" onclick="newSession()">Nova</button>
      <button class="btn btn-danger" onclick="clearSession()">Limpar</button>
    </div>
    <button class="btn" id="theme-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
  </header>

  <div id="messages">
    <div class="empty" id="empty-state">
      <div class="empty-icon">🤖</div>
      <p>Inicie uma conversa ou carregue uma sessão existente.</p>
    </div>
  </div>

  <div id="input-area">
    <textarea
      id="prompt"
      rows="1"
      placeholder="Digite uma mensagem… (Enter para enviar, Shift+Enter para nova linha)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <span class="send-icon">▲</span> Enviar
    </button>
  </div>

  <script>
    // ── Theme ─────────────────────────────────────────────────────
    if (localStorage.getItem('agentTheme') === 'light') document.body.classList.add('light');

    function toggleTheme() {
      document.body.classList.toggle('light');
      const isLight = document.body.classList.contains('light');
      localStorage.setItem('agentTheme', isLight ? 'light' : 'dark');
      document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
    }

    document.getElementById('theme-btn').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';

    const messagesEl = document.getElementById('messages');
    const promptEl   = document.getElementById('prompt');
    const sendBtn    = document.getElementById('send-btn');
    const sessionEl  = document.getElementById('session');
    const emptyEl    = document.getElementById('empty-state');

    // ── Session init ──────────────────────────────────────────────
    sessionEl.value = localStorage.getItem('agentSessionId') || generateId();
    saveSessionId();

    function generateId() {
      return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function saveSessionId() {
      localStorage.setItem('agentSessionId', sessionEl.value);
    }

    sessionEl.addEventListener('change', saveSessionId);

    // ── Auto-resize textarea ──────────────────────────────────────
    promptEl.addEventListener('input', () => {
      promptEl.style.height = 'auto';
      promptEl.style.height = promptEl.scrollHeight + 'px';
    });

    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── Markdown renderer (marked.js) ────────────────────────────
    (function setupMarked() {
      const renderer = new marked.Renderer();
      renderer.link = function({ href, title, text }) {
        const t = title ? ` title="${title}"` : '';
        return `<a href="${href}"${t} target="_blank" rel="noopener noreferrer">${text}</a>`;
      };
      marked.use({ renderer, gfm: true, breaks: true });
    })();

    function renderMarkdown(text) {
      return marked.parse(text);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── DOM helpers ───────────────────────────────────────────────
    function hideEmpty() {
      emptyEl.style.display = 'none';
    }

    function showEmpty() {
      if (messagesEl.children.length === 1) {
        emptyEl.style.display = '';
      }
    }

    function appendMessage(role, text) {
      hideEmpty();
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;

      if (role === 'function') {
        bubble.innerHTML = `<span class="fn-icon">⚙</span><span>${escapeHtml(text)}()</span>`;
      } else if (role === 'model') {
        bubble.innerHTML = renderMarkdown(text);
      } else {
        bubble.textContent = text;
      }

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return bubble;
    }

    function appendStreamingBubble() {
      hideEmpty();
      const row = document.createElement('div');
      row.className = 'msg-row model';

      const bubble = document.createElement('div');
      bubble.className = 'bubble model';

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      return bubble;
    }

    function showTyping() {
      if (document.getElementById('typing')) return;
      const row = document.createElement('div');
      row.className = 'msg-row model';
      row.id = 'typing';

      const tb = document.createElement('div');
      tb.className = 'typing-bubble';
      [0, 1, 2].forEach(() => {
        const d = document.createElement('div');
        d.className = 'dot';
        tb.appendChild(d);
      });

      row.appendChild(tb);
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Send message ──────────────────────────────────────────────
    async function sendMessage() {
      const prompt = promptEl.value.trim();
      const sessionId = sessionEl.value.trim();
      if (!prompt || !sessionId || sendBtn.disabled) return;

      appendMessage('user', prompt);
      promptEl.value = '';
      promptEl.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();

      let streamBubble = null;
      let accumulated = '';

      try {
        const res = await fetch('/prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, prompt }),
        });

        if (!res.ok) {
          removeTyping();
          appendMessage('model', 'Erro: ' + (await res.text()));
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buf += decoder.decode(value, { stream: true });
          const parts = buf.split('\n\n');
          buf = parts.pop();

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue;
            let ev;
            try { ev = JSON.parse(part.slice(6)); } catch { continue; }

            if (ev.type === 'text') {
              if (!streamBubble) {
                removeTyping();
                streamBubble = appendStreamingBubble();
              }
              accumulated += ev.content;
              streamBubble.innerHTML = renderMarkdown(accumulated);
              scrollToBottom();

            } else if (ev.type === 'function_call') {
              streamBubble = null;
              accumulated = '';
              removeTyping();
              appendMessage('function', ev.content);
              showTyping();

            } else if (ev.type === 'turn_done') {
              streamBubble = null;
              accumulated = '';
              removeTyping();

            } else if (ev.type === 'done') {
              removeTyping();

            } else if (ev.type === 'error') {
              removeTyping();
              appendMessage('model', 'Erro: ' + ev.content);
            }
          }
        }
      } catch (err) {
        removeTyping();
        appendMessage('model', 'Erro: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    // ── Session management ────────────────────────────────────────
    async function loadSession() {
      const sessionId = sessionEl.value.trim();
      if (!sessionId) return;
      saveSessionId();
      clearMessages();

      try {
        const res = await fetch('/history?session_id=' + encodeURIComponent(sessionId));
        if (!res.ok) { appendMessage('model', 'Falha ao carregar sessão.'); return; }

        const events = await res.json();
        if (!events || events.length === 0) { showEmpty(); return; }

        let lastRole = null;

        let texts = [];
        for (const ev of events) {
          const role = ev.role === 'user' ? 'user' : 'model';
          if (role !== lastRole && texts.length) { appendMessage(lastRole, texts.join('')); texts = []; }
          lastRole = role;
          for (const part of ev.parts) {
            if (part.function_call) {
              if (texts.length) { appendMessage(role, texts.join('')); texts = []; }
              appendMessage('function', part.function_call.name);
            } else if (part.text) {
              texts.push(part.text);
            }
          }
        }
        if (texts.length) appendMessage(lastRole, texts.join(''));
      } catch (err) {
        appendMessage('model', 'Erro ao carregar sessão: ' + err.message);
      }
    }

    function newSession() {
      sessionEl.value = generateId();
      saveSessionId();
      clearMessages();
      promptEl.focus();
    }

    async function clearSession() {
      const sessionId = sessionEl.value.trim();
      if (!sessionId) return;
      try {
        await fetch('/history?session_id=' + encodeURIComponent(sessionId), { method: 'DELETE' });
      } catch (_) {}
      clearMessages();
    }

    function clearMessages() {
      messagesEl.innerHTML = '';
      messagesEl.appendChild(emptyEl);
      emptyEl.style.display = '';
    }
  </script>
</body>
</html>
